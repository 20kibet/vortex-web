{% extends 'base.html' %} {% block content %}
<div class="bg-white rounded-xl shadow p-8 max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold mb-4">{{ service.name }}</h1>
  <p class="text-gray-700 mb-6">{{ service.description }}</p>
  <p class="text-blue-700 font-bold text-2xl mb-6">
    From KES {{ service.price }}
  </p>
  <a
    href="{% url 'checkout' %}"
    class="bg-blue-700 text-white px-8 py-3 rounded font-semibold hover:bg-blue-800"
  >
    Book This Service
  </a>
</div>
{% endblock %}
