{% extends 'base.html' %} {% block content %}
<h2 class="text-2xl font-bold mb-6">Our Services</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
  {% for service in services %}
  <div class="bg-white rounded-xl shadow p-6">
    <h3 class="font-bold text-xl mb-2">{{ service.name }}</h3>
    <p class="text-gray-600 mb-4">{{ service.description }}</p>
    <p class="text-blue-700 font-bold text-lg mb-4">
      From KES {{ service.price }}
    </p>
    <a
      href="{% url 'service_detail' service.slug %}"
      class="block text-center bg-blue-700 text-white py-2 rounded hover:bg-blue-800"
    >
      Learn More
    </a>
  </div>
  {% empty %}
  <p class="text-gray-500">No services available.</p>
  {% endfor %}
</div>
{% endblock %}
